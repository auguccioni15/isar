require conf/machine/stm32mp15x.conf

MACHINEOVERRIDES =. "stm32mp15x:"

COMPATIBLE_MACHINE:stm32mp157c-dk2 = "^(stm32mp15x|stm32mp157c-dk2)$"

U_BOOT_CONFIG:stm32mp157c-dk2 = "stm32mp15_trusted_defconfig && \
    sed -i 's/CONFIG_DEFAULT_DEVICE_TREE=.*/CONFIG_DEFAULT_DEVICE_TREE=\"stm32mp157c-dk2\"/' .config"
U_BOOT_BIN:stm32mp157c-dk2 = "u-boot.stm32"

# WIC: ST standard layout with separate bootfs
WKS_FILE:stm32mp157c-dk2 = "stm32mp15x-dk2.wks.in"

# Kernel + DK2 DTB copied into the FAT32 bootfs partition
DTB_FILES = "stm32mp157c-dk2.dtb"
IMAGE_BOOT_FILES:stm32mp157c-dk2 = "vmlinuz stm32mp157c-dk2.dtb"

IMAGE_PREINSTALL += "weston"

IMAGE_INSTALL:remove = "initramfs-tee-ftpm-hook"

# TF-A: stm32mp157c-dk2.dtb include STPMIC1 (stpmic@33) via stm32mp15xx-dkx.dtsi
TF_A_EXTRA_BUILDARGS:stm32mp157c-dk2 = " \
    ARCH=aarch32 ARM_ARCH_MAJOR=7 AARCH32_SP=optee \
    STM32MP_SDMMC=1 STM32MP_EMMC=1 \
    STM32MP_RAW_NAND=1 STM32MP_SPI_NAND=1 STM32MP_SPI_NOR=1 \
    DTB_FILE_NAME=stm32mp157c-dk2.dtb"
TF_A_BINARIES:stm32mp157c-dk2 = "release/tf-a-stm32mp157c-dk2.stm32"
