# STM32MP15x explicit config fragment
# These options have default y/m under ARCH_STM32 but are made explicit here
# to avoid relying on olddefconfig behaviour.

# Machine
CONFIG_MACH_STM32MP157=y

# SD/eMMC via STM32 SDMMC controller (depends on MMC_ARMMMCI=y in multi_v7)
CONFIG_MMC_STM32_SDMMC=y

# Ethernet: STM32 DWMAC glue (default ARCH_STM32)
CONFIG_DWMAC_STM32=y

# Pinmux
CONFIG_PINCTRL_STM32MP157=y

# Thermal
CONFIG_STM32_THERMAL=y

# Cortex-M4 remoteproc
CONFIG_STM32_RPROC=y

# Watchdog
CONFIG_STM32_WATCHDOG=y

# WiFi - Murata 1DX (CYW43438) via SDIO
# CFG80211, MAC80211, BRCMFMAC already =m in multi_v7_defconfig
# BRCMFMAC_SDIO has default y when MMC=y and BRCMFMAC is set
CONFIG_BRCMFMAC=m
CONFIG_BRCMFMAC_SDIO=y

# Bluetooth - CYW43438 via UART (H4 protocol)
# BT, BT_HCIUART, BT_HCIUART_BCM already in multi_v7_defconfig
CONFIG_BT_HCIUART_H4=y

# DRM/LTDC display controller + DSI panel (DK2 display board)
CONFIG_DRM_STM=y
CONFIG_DRM_MIPI_DSI=y
CONFIG_DRM_PANEL_ORISETECH_OTM8009A=y
CONFIG_DRM_SII902X=m
CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_BACKLIGHT_PWM=y
CONFIG_DRM_FBDEV_EMULATION=y

# Touchscreen - FT5x06 compatible (DK2 display board)
CONFIG_TOUCHSCREEN_EDT_FT5X06=y
