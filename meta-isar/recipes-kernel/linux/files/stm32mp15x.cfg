# STM32MP15x explicit config fragment
# These options have default y/m under ARCH_STM32 but are made explicit here
# to avoid relying on olddefconfig behaviour.

# Machine
CONFIG_MACH_STM32MP157=y

# Serial console (STM32 UART - ttySTM0 = UART4 @ 0x40010000)
CONFIG_SERIAL_STM32=y
CONFIG_SERIAL_STM32_CONSOLE=y

# SD/eMMC/SDIO via STM32 SDMMC controller
# MMC=y built-in ensures SDIO devices (WiFi) are enumerated at boot
# PWRSEQ_SIMPLE=y must also be built-in (not module) so WL_REG_ON GPIO
# is toggled before SDMMC2 probes the CYW43438
CONFIG_MMC=y
CONFIG_MMC_STM32_SDMMC=y
CONFIG_MMC_PWRSEQ_SIMPLE=y

# Ethernet: STM32 DWMAC glue (default ARCH_STM32)
CONFIG_DWMAC_STM32=y

# Pinmux
CONFIG_PINCTRL_STM32MP157=y

# Thermal: disabled - stm_thermal_probe causes immediate hardware reset on
# STM32MP157F-DK2 (F-variant board using C-variant DTS); investigate later
# CONFIG_STM32_THERMAL is not set

# TEE / OP-TEE (secure world communication)
CONFIG_TEE=y
CONFIG_OPTEE=y

# Cortex-M4 remoteproc
CONFIG_STM32_RPROC=y

# Hardware spinlock (HSEM@4c000000) - required by EXTI and pinctrl via hwlocks=
# Without this, hwspin_lock_request_specific() returns -EPROBE_DEFER forever,
# blocking EXTI → pinctrl → SDMMC1 (rootfs) from ever probing.
CONFIG_HWSPINLOCK=y
CONFIG_HWSPINLOCK_STM32=y

# Power domain framework (required for deferred probe resolution on STM32MP1)
CONFIG_PM_GENERIC_DOMAINS=y
CONFIG_PM_GENERIC_DOMAINS_OF=y

# Watchdog
CONFIG_STM32_WATCHDOG=y

# WiFi - Murata 1DX (CYW43438) via SDIO
# CFG80211, MAC80211, BRCMFMAC already =m in multi_v7_defconfig
# BRCMFMAC_SDIO has default y when MMC=y and BRCMFMAC is set
CONFIG_BRCMFMAC=y
CONFIG_BRCMFMAC_SDIO=y

# Bluetooth - CYW43438 via UART (H4 protocol)
# BT, BT_HCIUART, BT_HCIUART_BCM already in multi_v7_defconfig
CONFIG_BT_HCIUART_H4=y

# DRM/LTDC display controller + DSI panel (DK2 display board)
CONFIG_DRM_STM=y
# STM32 DSI host glue (dw-mipi-dsi-stm): bridges LTDC to the DSI panel.
# Without it the OTM8009A panel cannot attach, LTDC has no connector and
# the display stays off even though Weston starts on card1.
CONFIG_DRM_STM_DSI=y
CONFIG_DRM_DW_MIPI_DSI=y
CONFIG_DRM_MIPI_DSI=y
CONFIG_DRM_PANEL_ORISETECH_OTM8009A=y
# FRIDA FRD397B25009 (Novatek NT35510) — the panel actually fitted to this
# board. Driver replaced with a backport that knows the FRIDA variant.
CONFIG_DRM_PANEL_NOVATEK_NT35510=y
CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_BACKLIGHT_PWM=y
CONFIG_DRM_FBDEV_EMULATION=y

# Touchscreen - FT5x06 compatible (DK2 display board)
CONFIG_TOUCHSCREEN_EDT_FT5X06=y
